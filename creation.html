<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等高线地形编辑器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        canvas { display: block; }
        .game-ui { pointer-events: none; position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); pointer-events: auto; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .tool-btn { 
            padding: 12px 8px; border-radius: 8px; font-size: 0.75rem; font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.3); color: #94a3b8; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .tool-btn:hover { background: rgba(51, 65, 85, 0.8); color: #f8fafc; transform: translateY(-1px); }
        .tool-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .tool-btn svg { width: 20px; height: 20px; }
        input[type="range"] { accent-color: #3b82f6; width: 100%; height: 6px; border-radius: 3px; background: #1e293b; appearance: none; }
        .status-bar { font-size: 0.7rem; color: #64748b; background: rgba(15, 23, 42, 0.9); padding: 4px 12px; border-radius: 20px; }
        #contour-canvas { background: #1a1a2e; border-radius: 8px; border: 2px solid #3b82f6; }
        .tab-btn { padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(71, 85, 105, 0.3); color: #94a3b8; cursor: pointer; }
        .tab-btn:hover { background: rgba(51, 65, 85, 0.8); color: #f8fafc; }
        .tab-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; }
        .palette-card { padding: 5px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: all 0.2s; margin-bottom: 3px; background: rgba(255,255,255,0.02); display: flex; flex-direction: column; gap: 3px; }
        .palette-card:hover { background: rgba(255,255,255,0.04); }
        .palette-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .swatch-row { display: flex; height: 10px; border-radius: 3px; overflow: hidden; width: 100%; }
        .swatch-item { flex: 1; height: 100%; border-right: 0.5px solid rgba(0,0,0,0.1); }
        .swatch-item:last-child { border-right: none; }
    </style>
</head>
<body>

<div id="loading" class="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-medium tracking-widest text-blue-400">正在构建等高线引擎...</p>
</div>

<div class="game-ui">
    <!-- Top Bar -->
    <div class="flex justify-between items-start">
        <div class="panel p-4 flex items-center gap-4">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-6 h-6 text-white"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            </div>
            <div>
                <h1 class="text-sm font-bold leading-none">等高线地形编辑器</h1>
                <p class="text-[10px] text-slate-500 mt-1 uppercase tracking-tighter">Contour Map Editor</p>
            </div>
        </div>
        
        <div class="flex gap-2">
            <button onclick="generateContour()" class="panel px-4 py-2 text-xs font-bold hover:bg-green-900/20 text-green-400 border-green-900/30">生成等高线</button>
            <button onclick="resetTerrain()" class="panel px-4 py-2 text-xs font-bold hover:bg-red-900/20 text-red-400 border-red-900/30">重置地图</button>
            <button onclick="exportData()" class="panel px-4 py-2 text-xs font-bold hover:bg-blue-600 transition">保存地形</button>
        </div>
    </div>

    <!-- Left Side - Contour Map -->
    <div class="flex flex-col gap-4 absolute left-4 top-24 bottom-24 pointer-events-none">
        <div class="panel p-4 w-64 flex flex-col gap-4">
            <div class="flex gap-2">
                <button onclick="setMode('contour')" id="tab-contour" class="tab-btn active flex-1">等高线</button>
                <button onclick="setMode('terrain')" id="tab-terrain" class="tab-btn flex-1">3D地形</button>
            </div>
            
            <div id="contour-panel">
                <canvas id="contour-canvas" width="240" height="240" style="cursor: pointer; pointer-events: auto;" title="双击放大"></canvas>
                <div class="mt-3 space-y-2">
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold uppercase">等高线间隔</label>
                        <input type="range" id="contourInterval" min="5" max="30" value="10" class="mt-1">
                        <div class="text-right text-[10px] text-blue-400" id="intervalVal">10m</div>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold uppercase">最大高度</label>
                        <input type="range" id="maxHeight" min="50" max="200" value="100" class="mt-1">
                        <div class="text-right text-[10px] text-blue-400" id="heightVal">100m</div>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold uppercase">地形复杂度</label>
                        <input type="range" id="complexity" min="1" max="5" value="1" class="mt-1">
                        <div class="text-right text-[10px] text-blue-400" id="complexityVal">简单</div>
                    </div>
                </div>
            </div>
            
            <div id="terrain-info" class="hidden">
                <div class="text-[10px] text-slate-500 font-bold uppercase mb-2">地形信息</div>
                <div class="space-y-1 text-xs">
                    <div class="flex justify-between"><span class="text-slate-400">最高点:</span><span id="maxElevation" class="text-blue-400">0m</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">最低点:</span><span id="minElevation" class="text-blue-400">0m</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">平均高度:</span><span id="avgElevation" class="text-blue-400">0m</span></div>
                </div>
            </div>
            
            <div id="terrain-settings" class="hidden">
                <div class="text-[10px] text-slate-500 font-bold uppercase mb-2">3D显示设置</div>
                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <span class="text-[11px]">显示等高线</span>
                        <input type="checkbox" id="show3dContour" class="w-4 h-4 accent-blue-500" checked>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold uppercase">等高距</label>
                        <input type="range" id="contourSpacing" min="5" max="50" value="20" class="mt-1">
                        <div class="text-right text-[10px] text-blue-400" id="spacingVal">20m</div>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold uppercase">线宽</label>
                        <input type="range" id="contourWidth" min="0.5" max="5" step="0.5" value="1" class="mt-1">
                        <div class="text-right text-[10px] text-blue-400" id="widthVal">1.0</div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[11px]">等高线颜色</span>
                        <input type="color" id="contourColor" class="w-8 h-6 cursor-pointer rounded" value="#ffffff">
                    </div>
                </div>
            </div>
            
            <div id="palette-panel" class="hidden">
                <div class="text-[10px] text-slate-500 font-bold uppercase mb-2">配色方案</div>
                <div class="space-y-1 max-h-40 overflow-y-auto" id="palette-list">
                </div>
            </div>
        </div>
    </div>

    <!-- Right Side Tools -->
    <div class="flex flex-col items-end gap-4 absolute right-4 top-24 bottom-24 pointer-events-none">
        <div class="panel p-4 w-56 flex flex-col gap-6">
            <section>
                <header class="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest flex justify-between">
                    <span>笔刷设置</span>
                    <span id="brushSizeVal">20</span>
                </header>
                <input type="range" id="brushSize" min="5" max="80" value="20">
                <div class="mt-4">
                    <div class="flex justify-between text-[10px] text-slate-500 mb-2 font-bold uppercase">强度 <span id="brushStrengthVal">1.2</span></div>
                    <input type="range" id="brushStrength" min="0.1" max="5" step="0.1" value="1.2">
                </div>
            </section>

            <section>
                <header class="text-[10px] font-bold text-blue-400 mb-3 uppercase tracking-widest">地貌改造</header>
                <div class="tool-grid">
                    <button onclick="setTool('raise')" id="btn-raise" class="tool-btn active"><span>隆起</span></button>
                    <button onclick="setTool('lower')" id="btn-lower" class="tool-btn"><span>下陷</span></button>
                    <button onclick="setTool('level')" id="btn-level" class="tool-btn"><span>平整</span></button>
                    <button onclick="setTool('soften')" id="btn-soften" class="tool-btn"><span>平滑</span></button>
                    <button onclick="setTool('slope')" id="btn-slope" class="tool-btn"><span>斜坡</span></button>
                    <button onclick="setTool('plateau')" id="btn-plateau" class="tool-btn"><span>台地</span></button>
                </div>
            </section>

            <section>
                <header class="text-[10px] font-bold text-purple-400 mb-3 uppercase tracking-widest">视角控制</header>
                <div class="tool-grid">
                    <button onclick="setTool('rotate')" id="btn-rotate" class="tool-btn"><span>旋转</span></button>
                </div>
            </section>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div class="flex justify-center mb-4">
        <div class="status-bar flex items-center gap-4">
            <span>[右键] 旋转视角</span>
            <span class="w-px h-3 bg-slate-700"></span>
            <span>[滚轮] 缩放</span>
            <span class="w-px h-3 bg-slate-700"></span>
            <span>[左键] 执行工具/旋转</span>
            <span class="w-px h-3 bg-slate-700"></span>
            <span id="coordsDisplay">X: 0, Z: 0</span>
        </div>
    </div>
</div>

<script>
    const paletteData = [
        { name: '经典地理', colors: [0x051a10, 0x14311c, 0x2a4d31, 0x4d5d3d, 0x7b6d4e, 0xa38c6d, 0xd4c0a1, 0xffffff] },
        { name: '卫星遥感', colors: [0x0b141a, 0x1a2b26, 0x2d3d2a, 0x4a5c31, 0x7a8a47, 0xa49a6a, 0xd1c4a1, 0xf2ebe1] },
        { name: '冰岛苔藓', colors: [0x0c1109, 0x182312, 0x27381b, 0x3d542d, 0x5a7a44, 0x82a664, 0xafd193, 0xe4f2d5] },
        { name: '热力熔岩', colors: [0x000000, 0x2d0a05, 0x5a1208, 0x8a1d0d, 0xbd2e15, 0xe04a2d, 0xf08060, 0xffd0b0] },
        { name: '深海极光', colors: [0x020617, 0x0a1435, 0x152b6b, 0x1e4bb5, 0x2dd4bf, 0x5eead4, 0x99f6e4, 0xf0fdfa] },
        { name: '数字赛博', colors: [0x09090b, 0x1e1b4b, 0x312e81, 0x4338ca, 0x6366f1, 0x818cf8, 0xa5b4fc, 0xe0e7ff] },
        { name: '赤色戈壁', colors: [0x270b02, 0x441507, 0x78350f, 0x92400e, 0xb45309, 0xd97706, 0xf59e0b, 0xfef3c7] },
        { name: '复古胶片', colors: [0x1c1917, 0x44403c, 0x78716c, 0xa8a29e, 0xd6d3d1, 0xe7e5e4, 0xf5f5f4, 0xffffff] },
        { name: '极地冬日', colors: [0x0f172a, 0x1e293b, 0x334155, 0x475569, 0x64748b, 0x94a3b8, 0xcbd5e1, 0xf8fafc] },
        { name: '热带丛林', colors: [0x064e3b, 0x065f46, 0x047857, 0x059669, 0x10b981, 0x34d399, 0x6ee7b7, 0xecfdf5] },
        { name: '沙漠黄昏', colors: [0x1a0a00, 0x3d1a00, 0x6b2c00, 0x9a4400, 0xc46200, 0xe68a00, 0xf5b800, 0xfff0d0] },
        { name: '海洋深蓝', colors: [0x000814, 0x001a33, 0x002d5c, 0x004488, 0x0060aa, 0x0080cc, 0x00a0e6, 0x00c8ff] },
        { name: '樱花粉黛', colors: [0x2d1f1f, 0x4a2c3a, 0x7a4a5a, 0xa86a7a, 0xd68a9a, 0xf0aab0, 0xfad0d6, 0xfff0f5] },
        { name: '秋日枫叶', colors: [0x1a0500, 0x3d0a00, 0x781400, 0xb91c1c, 0xdc2626, 0xef4444, 0xf87171, 0xfecaca] },
        { name: '翡翠森林', colors: [0x022c22, 0x047857, 0x059669, 0x10b981, 0x34d399, 0x6ee7b7, 0xa7f3d0, 0xd1fae5] },
        { name: '紫色星云', colors: [0x1e1b4b, 0x312e81, 0x4338ca, 0x6366f1, 0x818cf8, 0xa5b4fc, 0xc7d2fe, 0xe0e7ff] },
        { name: '青铜时代', colors: [0x1c1917, 0x44403c, 0x78716c, 0xa8a29e, 0xd6d3d1, 0xb45309, 0xd97706, 0xfcd34d] },
        { name: '水墨丹青', colors: [0x000000, 0x1f2937, 0x374151, 0x4b5563, 0x6b7280, 0x9ca3af, 0xd1d5db, 0xf3f4f6] }
    ];

    let currentPalette = paletteData[0].colors;
    let isSmoothMode = false;
    
    let scene, camera, renderer, controls, terrain, water, brushCursor;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let isEditing = false;
    let currentTool = 'raise';
    let currentMode = 'contour';
    let slopeAnchor = null;
    let rotateStartX = 0;
    let rotateStartY = 0;
    let material;
    let skirtMesh, bottomMesh;
    
    const T_SIZE = 400;
    const T_SEGMENTS = 160;
    const waterColor = new THREE.Color(0x0ea5e9);

    let heightData = [];
    let contourCanvas, contourCtx;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);
        scene.fog = new THREE.FogExp2(0x0f172a, 0.0015);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.set(300, 300, 300);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };

        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sun.position.set(200, 400, 100);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -300;
        sun.shadow.camera.right = 300;
        sun.shadow.camera.top = 300;
        sun.shadow.camera.bottom = -300;
        scene.add(sun);

        createTerrain();
        addTerrainEdges();
        createWater();
        createBrushCursor();
        initContourCanvas();

        renderer.domElement.addEventListener('pointerdown', handleDown);
        window.addEventListener('pointerup', () => isEditing = false);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('resize', onWindowResize);

        document.getElementById('brushSize').oninput = (e) => {
            const val = e.target.value;
            document.getElementById('brushSizeVal').innerText = val;
            brushCursor.scale.set(val, 1, val);
        };
        document.getElementById('brushStrength').oninput = (e) => {
            document.getElementById('brushStrengthVal').innerText = e.target.value;
        };
        document.getElementById('contourInterval').oninput = (e) => {
            document.getElementById('intervalVal').innerText = e.target.value + 'm';
        };
        document.getElementById('maxHeight').oninput = (e) => {
            document.getElementById('heightVal').innerText = e.target.value + 'm';
        };
        document.getElementById('complexity').oninput = (e) => {
            const labels = ['简单', '较简单', '中等', '较复杂', '复杂'];
            document.getElementById('complexityVal').innerText = labels[e.target.value - 1];
        };
        document.getElementById('show3dContour').onchange = updateUniforms;
        document.getElementById('contourSpacing').oninput = (e) => {
            document.getElementById('spacingVal').innerText = e.target.value + 'm';
            updateUniforms();
        };
        document.getElementById('contourWidth').oninput = (e) => {
            document.getElementById('widthVal').innerText = e.target.value;
            updateUniforms();
        };
        document.getElementById('contourColor').oninput = updateUniforms;

        renderPaletteList();

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            generateContour();
            setTimeout(() => {
                if(material && material.userData.shader) {
                    material.needsUpdate = true;
                }
            }, 100);
        }, 1000);
        animate();
    }
    
    function renderPaletteList() {
        const container = document.getElementById('palette-list');
        paletteData.forEach((p, idx) => {
            const card = document.createElement('div');
            card.className = `palette-card ${idx === 0 ? 'active' : ''}`;
            card.onclick = () => {
                document.querySelectorAll('.palette-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentPalette = p.colors;
                updateUniforms();
            };

            const label = document.createElement('div');
            label.className = 'text-[10px] text-slate-400 font-medium px-0.5';
            label.innerText = p.name;

            const row = document.createElement('div');
            row.className = 'swatch-row';
            p.colors.forEach(hex => {
                const s = document.createElement('div');
                s.className = 'swatch-item';
                s.style.backgroundColor = `#${hex.toString(16).padStart(6, '0')}`;
                row.appendChild(s);
            });

            card.appendChild(label);
            card.appendChild(row);
            container.appendChild(card);
        });
    }

    function createTerrain() {
        const geo = new THREE.PlaneBufferGeometry(T_SIZE, T_SIZE, T_SEGMENTS, T_SEGMENTS);
        geo.rotateX(-Math.PI / 2);

        const pos = geo.attributes.position;
        let maxHeight = 0;
        for(let i = 0; i < pos.count; i++) {
            if(pos.getY(i) > maxHeight) maxHeight = pos.getY(i);
        }

        material = new THREE.MeshStandardMaterial({
            roughness: 0.8,
            metalness: 0.1,
            flatShading: false
        });

        material.onBeforeCompile = getShaderCompileFunction(maxHeight || 100);

        terrain = new THREE.Mesh(geo, material);
        terrain.receiveShadow = true;
        terrain.castShadow = true;
        scene.add(terrain);
        
        initHeightData();
    }
    
    function getShaderCompileFunction(maxHeightForShader) {
        const maxH = maxHeightForShader || 100;
        return function(shader) {
            shader.uniforms.uPalette = { value: currentPalette.map(c => new THREE.Color(c)) };
            shader.uniforms.uSmooth = { value: isSmoothMode ? 1.0 : 0.0 };
            shader.uniforms.uShowContour = { value: 1.0 };
            shader.uniforms.uContourSpacing = { value: 20.0 };
            shader.uniforms.uContourWidth = { value: 1.0 };
            shader.uniforms.uContourColor = { value: new THREE.Color(0xffffff) };
            shader.uniforms.uMaxHeight = { value: maxH };
            
            material.userData.shader = shader;

            shader.vertexShader = `
                uniform float uMaxHeight;
                varying float vHeight;
                ${shader.vertexShader}
            `.replace('#include <begin_vertex>', 
                `#include <begin_vertex>
                vHeight = position.y / uMaxHeight;`
            );

            shader.fragmentShader = `
                uniform vec3 uPalette[8];
                uniform float uSmooth;
                uniform float uShowContour;
                uniform float uContourSpacing;
                uniform float uContourWidth;
                uniform vec3 uContourColor;
                uniform float uMaxHeight;
                varying float vHeight;
                ${shader.fragmentShader}
            `.replace('#include <map_fragment>', `
                float h = clamp(vHeight, 0.0, 0.999);
                vec3 finalColor;

                if(uSmooth > 0.5) {
                    float fIdx = h * 7.0;
                    int idx = int(floor(fIdx));
                    float t = fract(fIdx);
                    finalColor = mix(uPalette[idx], uPalette[idx+1], t);
                } else {
                    float fIdx = h * 8.0;
                    float idx = floor(fIdx);
                    float edge = smoothstep(0.96, 1.0, fract(fIdx));
                    vec3 c1 = uPalette[int(idx)];
                    vec3 c2 = uPalette[int(min(idx + 1.0, 7.0))];
                    finalColor = mix(c1, c2, edge * 0.1); 
                }

                diffuseColor.rgb = finalColor;

                if(uShowContour > 0.5) {
                    float contourFreq = 50.0 / uContourSpacing;
                    float lineWidth = uContourWidth * 0.5;
                    float line = abs(fract(vHeight * contourFreq - 0.5) - 0.5) / fwidth(vHeight * contourFreq);
                    diffuseColor.rgb = mix(diffuseColor.rgb, uContourColor, (1.0 - smoothstep(0.0, lineWidth, line)) * 0.5);
                }
            `);
        };
    }
    
    function updateUniforms() {
        if(!material || !material.userData.shader) return;
        const shader = material.userData.shader;

    function generateContour() {
        const maxHeight = parseFloat(document.getElementById('maxHeight').value);
        const complexity = parseInt(document.getElementById('complexity').value);
        const seed = Math.random() * 1000;
        
        const pos = terrain.geometry.attributes.position;
        const segmentsPerSide = T_SEGMENTS + 1;
        
        function noise(x, y, s) {
            return Math.sin(x * 12.9898 + y * 78.233 + s) * 43758.5453 % 1;
        }
        
        function smoothNoise(x, y, s) {
            const ix = Math.floor(x);
            const iy = Math.floor(y);
            const fx = x - ix;
            const fy = y - iy;
            
            const v1 = noise(ix, iy, s);
            const v2 = noise(ix + 1, iy, s);
            const v3 = noise(ix, iy + 1, s);
            const v4 = noise(ix + 1, iy + 1, s);
            
            const sx = fx * fx * (3 - 2 * fx);
            const sy = fy * fy * (3 - 2 * fy);
            
            return v1 + (v2 - v1) * sx + (v3 - v1) * sy + (v4 - v3 - v2 + v1) * sx * sy;
        }
        
        function fbm(x, y, octaves, s) {
            let value = 0;
            let amp = 0.5;
            let freq = 1;
            for(let i = 0; i < octaves; i++) {
                value += smoothNoise(x * freq, y * freq, s + i * 10) * amp;
                amp *= 0.5;
                freq *= 2;
            }
            return value;
        }
        
        let actualMaxHeight = 0;
        for(let z = 0; z < segmentsPerSide; z++) {
            for(let x = 0; x < segmentsPerSide; x++) {
                const i = z * segmentsPerSide + x;
                const nx = x / segmentsPerSide;
                const nz = z / segmentsPerSide;
                
                let val;
                switch(complexity) {
                    case 1:
                        val = fbm(nx * 2, nz * 2, 2, seed) * 0.8;
                        break;
                    case 2:
                        val = fbm(nx * 3, nz * 3, 3, seed) * 0.6;
                        val += fbm(nx * 6, nz * 6, 2, seed + 1) * 0.3;
                        break;
                    case 3:
                        val = fbm(nx * 4, nz * 4, 4, seed) * 0.5;
                        val += fbm(nx * 8, nz * 8, 3, seed + 1) * 0.25;
                        break;
                    case 4:
                        val = fbm(nx * 4, nz * 4, 4, seed) * 0.5;
                        val += fbm(nx * 8, nz * 8, 3, seed + 1) * 0.25;
                        val += fbm(nx * 16, nz * 16, 2, seed + 2) * 0.125;
                        break;
                    case 5:
                        val = fbm(nx * 4, nz * 4, 4, seed) * 0.5;
                        val += fbm(nx * 8, nz * 8, 3, seed + 1) * 0.25;
                        val += fbm(nx * 16, nz * 16, 2, seed + 2) * 0.125;
                        const ridge = Math.abs(fbm(nx * 6, nz * 6, 3, seed + 3) - 0.5) * 2;
                        val += (1 - ridge) * (1 - ridge) * 0.3;
                        break;
                }
                
                let height = (val + 0.3) * maxHeight;
                height = Math.max(1, Math.min(maxHeight, height));
                
                pos.setY(i, height);
                heightData[i] = height;
                actualMaxHeight = Math.max(actualMaxHeight, height);
            }
        }
        
        pos.needsUpdate = true;
        terrain.geometry.computeVertexNormals();
        
        updateShaderMaxHeight(actualMaxHeight);
        drawContourMap();
        updateTerrainInfo();
        updateTerrainEdges();
    }
    
    function updateShaderMaxHeight(maxHeight) {
        if(!material || !material.userData.shader) return;
        const shader = material.userData.shader;
        const maxH = Math.max(maxHeight, 1);
        shader.uniforms.uMaxHeight.value = maxH;
        material.needsUpdate = true;
    }

    function drawContourMap() {
        const width = contourCanvas.width;
        const height = contourCanvas.height;
        const interval = parseFloat(document.getElementById('contourInterval').value);
        
        contourCtx.fillStyle = '#1a1a2e';
        contourCtx.fillRect(0, 0, width, height);
        
        const segmentsPerSide = T_SEGMENTS + 1;
        const cellWidth = width / T_SEGMENTS;
        const cellHeight = height / T_SEGMENTS;
        
        let maxH = 0, minH = Infinity, totalH = 0;
        
        for(let z = 0; z < T_SEGMENTS; z++) {
            for(let x = 0; x < T_SEGMENTS; x++) {
                const i = z * segmentsPerSide + x;
                const h = heightData[i];
                
                if(h === undefined) continue;
                
                maxH = Math.max(maxH, h);
                minH = Math.min(minH, h);
                totalH += h;
                
                const normalizedH = Math.min(1, h / 200);
                const brightness = Math.floor(30 + normalizedH * 50);
                contourCtx.fillStyle = `rgb(${brightness}, ${brightness + 20}, ${brightness + 40})`;
                contourCtx.fillRect(x * cellWidth, z * cellHeight, cellWidth + 1, cellHeight + 1);
            }
        }
        
        if(maxH === 0) return;
        
        const avgH = totalH / (T_SEGMENTS * T_SEGMENTS);
        
        contourCtx.strokeStyle = '#3b82f6';
        contourCtx.lineWidth = 1;
        
        const grid = [];
        for(let y = 0; y <= T_SEGMENTS; y++) {
            grid[y] = [];
            for(let x = 0; x <= T_SEGMENTS; x++) {
                const idx = y * segmentsPerSide + x;
                grid[y][x] = heightData[idx] || 0;
            }
        }
        
        for(let level = interval; level <= maxH; level += interval) {
            const paths = generateContourPaths(level, T_SEGMENTS, grid);
            
            for(const path of paths) {
                if(path.length < 2) continue;
                
                contourCtx.beginPath();
                contourCtx.moveTo(path[0].x * cellWidth, path[0].y * cellHeight);
                
                for(let i = 1; i < path.length; i++) {
                    contourCtx.lineTo(path[i].x * cellWidth, path[i].y * cellHeight);
                }
                
                contourCtx.stroke();
            }
        }
        
        contourCtx.fillStyle = '#ffffff';
        contourCtx.font = '10px Arial';
        contourCtx.fillText(`最高: ${maxH.toFixed(1)}m`, 5, 12);
        contourCtx.fillText(`最低: ${minH.toFixed(1)}m`, 5, 24);
        contourCtx.fillText(`平均: ${avgH.toFixed(1)}m`, 5, 36);
    }
    
    function generateContourPaths(targetLevel, segs, grid) {
        const paths = [];
        const visited = new Set();
        
        for(let y = 0; y < segs; y++) {
            for(let x = 0; x < segs; x++) {
                const key = `${x},${y}`;
                if(visited.has(key)) continue;
                
                const h1 = grid[y][x];
                const h2 = grid[y][x+1];
                const h3 = grid[y+1][x];
                const h4 = grid[y+1][x+1];
                
                const crosses = (h1 <= targetLevel && h2 >= targetLevel) || (h1 >= targetLevel && h2 <= targetLevel) ||
                               (h2 <= targetLevel && h4 >= targetLevel) || (h2 >= targetLevel && h4 <= targetLevel) ||
                               (h4 <= targetLevel && h3 >= targetLevel) || (h4 >= targetLevel && h3 <= targetLevel) ||
                               (h3 <= targetLevel && h1 >= targetLevel) || (h3 >= targetLevel && h1 <= targetLevel);
                
                if(crosses) {
                    const path = traceContourPath(targetLevel, x, y, segs, grid, visited);
                    if(path.length > 2) {
                        paths.push(path);
                    }
                }
            }
        }
        
        return paths;
    }
    
    function traceContourPath(targetLevel, startX, startY, segs, grid, visited) {
        const path = [];
        let x = startX, y = startY;
        let maxSteps = segs * 8;
        let steps = 0;
        let prevEdge = -1;
        
        while(steps < maxSteps) {
            const key = `${x},${y}`;
            if(visited.has(key)) break;
            visited.add(key);
            
            const h1 = grid[y][x];
            const h2 = grid[y][x+1];
            const h3 = grid[y+1][x];
            const h4 = grid[y+1][x+1];
            
            const intersections = [];
            
            if((h1 <= targetLevel && h2 >= targetLevel) || (h1 >= targetLevel && h2 <= targetLevel)) {
                const t = (targetLevel - h1) / (h2 - h1);
                intersections.push({x: x + t, y: y, edge: 0, nx: 0, ny: -1});
            }
            if((h2 <= targetLevel && h4 >= targetLevel) || (h2 >= targetLevel && h4 <= targetLevel)) {
                const t = (targetLevel - h2) / (h4 - h2);
                intersections.push({x: x + 1, y: y + t, edge: 1, nx: 1, ny: 0});
            }
            if((h4 <= targetLevel && h3 >= targetLevel) || (h4 >= targetLevel && h3 <= targetLevel)) {
                const t = (targetLevel - h4) / (h3 - h4);
                intersections.push({x: x + 1 - t, y: y + 1, edge: 2, nx: 0, ny: 1});
            }
            if((h3 <= targetLevel && h1 >= targetLevel) || (h3 >= targetLevel && h1 <= targetLevel)) {
                const t = (targetLevel - h3) / (h1 - h3);
                intersections.push({x: x, y: y + 1 - t, edge: 3, nx: -1, ny: 0});
            }
            
            if(intersections.length < 2) break;
            
            let selectedIntersection;
            if(intersections.length === 2) {
                selectedIntersection = intersections[0].edge !== prevEdge ? intersections[0] : intersections[1];
            } else {
                selectedIntersection = intersections.find(i => i.edge !== prevEdge) || intersections[0];
            }
            
            path.push({x: selectedIntersection.x, y: selectedIntersection.y});
            
            const nextX = x + selectedIntersection.nx;
            const nextY = y + selectedIntersection.ny;
            
            if(nextX < 0 || nextX >= segs || nextY < 0 || nextY >= segs) {
                break;
            }
            
            x = nextX;
            y = nextY;
            prevEdge = (selectedIntersection.edge + 2) % 4;
            steps++;
        }
        
        return path;
    }

    function updateTerrainInfo() {
        let maxH = 0, minH = Infinity, totalH = 0;
        const count = heightData.length;
        
        for(let i = 0; i < count; i++) {
            const h = heightData[i];
            maxH = Math.max(maxH, h);
            minH = Math.min(minH, h);
            totalH += h;
        }
        
        document.getElementById('maxElevation').innerText = maxH.toFixed(1) + 'm';
        document.getElementById('minElevation').innerText = minH.toFixed(1) + 'm';
        document.getElementById('avgElevation').innerText = (totalH / count).toFixed(1) + 'm';
    }

    function handleDown(e) {
        if(e.button !== 0) return;
        isEditing = true;
        
        if(currentTool === 'rotate') {
            rotateStartX = e.clientX;
            rotateStartY = e.clientY;
            return;
        }
        
        if(currentTool === 'slope') {
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(terrain);
            if(hits.length > 0) {
                if(!slopeAnchor) {
                    slopeAnchor = hits[0].point.clone();
                } else {
                    applySlope(slopeAnchor, hits[0].point.clone());
                    slopeAnchor = null;
                }
            }
        } else {
            applyTool();
        }
    }

    function onPointerMove(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        if(currentTool === 'rotate' && isEditing) {
            const deltaX = e.clientX - rotateStartX;
            const deltaY = e.clientY - rotateStartY;
            
            const offset = camera.position.clone().sub(controls.target);
            const spherical = new THREE.Spherical();
            spherical.setFromVector3(offset);
            
            spherical.theta -= deltaX * 0.005;
            spherical.phi -= deltaY * 0.005;
            spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
            
            offset.setFromSpherical(spherical);
            camera.position.copy(controls.target).add(offset);
            camera.lookAt(controls.target);
            
            rotateStartX = e.clientX;
            rotateStartY = e.clientY;
            return;
        }

        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(terrain);

        if(currentTool === 'rotate') {
            brushCursor.visible = false;
            return;
        }

        if(hits.length > 0) {
            const pt = hits[0].point;
            brushCursor.position.set(pt.x, pt.y, pt.z);
            brushCursor.visible = true;
            document.getElementById('coordsDisplay').innerText = `X: ${Math.round(pt.x)}, Z: ${Math.round(pt.z)}`;
            if(isEditing && currentTool !== 'slope') applyTool();
        } else {
            brushCursor.visible = false;
        }
    }

    function setTool(t) {
        currentTool = t;
        slopeAnchor = null;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + t).classList.add('active');
        
        if(t === 'slope') brushCursor.children[0].material.color.set(0xf59e0b);
        else if(t === 'rotate') brushCursor.children[0].material.color.set(0xa855f7);
        else brushCursor.children[0].material.color.set(0x3b82f6);
    }

    function applyTool() {
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(terrain);
        if(hits.length === 0) return;

        const center = hits[0].point;
        const radius = parseFloat(document.getElementById('brushSize').value);
        const strength = parseFloat(document.getElementById('brushStrength').value);

        const pos = terrain.geometry.attributes.position;

        let needsPos = false;

        for(let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const z = pos.getZ(i);
            const y = pos.getY(i);
            const dist = Math.sqrt((x - center.x) ** 2 + (z - center.z) ** 2);

            if(dist < radius) {
                const falloff = Math.pow(1 - dist / radius, 2);
                
                if(['raise','lower','level','soften','plateau'].includes(currentTool)) {
                    needsPos = true;
                    switch(currentTool) {
                        case 'raise': pos.setY(i, y + strength * falloff); break;
                        case 'lower': pos.setY(i, y - strength * falloff); break;
                        case 'level': pos.setY(i, y + (center.y - y) * 0.1 * strength * falloff); break;
                        case 'soften': pos.setY(i, y + (center.y - y) * 0.05 * falloff); break;
                        case 'plateau': 
                            const step = 20;
                            const targetY = Math.round(center.y / step) * step;
                            pos.setY(i, y + (targetY - y) * 0.1 * strength * falloff);
                            break;
                    }
                    heightData[i] = pos.getY(i);
                }
            }
        }

        if(needsPos) {
            pos.needsUpdate = true;
            terrain.geometry.computeVertexNormals();
            drawContourMap();
            
            let newMaxHeight = 0;
            for(let i = 0; i < pos.count; i++) {
                if(pos.getY(i) > newMaxHeight) newMaxHeight = pos.getY(i);
            }
            updateShaderMaxHeight(newMaxHeight);
            updateTerrainEdges();
        }
    }

    function applySlope(start, end) {
        const pos = terrain.geometry.attributes.position;
        const radius = parseFloat(document.getElementById('brushSize').value);
        
        const dir = new THREE.Vector3().subVectors(end, start);
        const length = dir.length();
        dir.normalize();

        for(let i = 0; i < pos.count; i++) {
            const p = new THREE.Vector3(pos.getX(i), 0, pos.getZ(i));
            const baseP = new THREE.Vector3(start.x, 0, start.z);
            
            const v = new THREE.Vector3().subVectors(p, baseP);
            const projection = v.dot(dir);
            
            if(projection >= 0 && projection <= length) {
                const closestPoint = new THREE.Vector3().copy(dir).multiplyScalar(projection).add(baseP);
                const distToLine = p.distanceTo(closestPoint);

                if(distToLine < radius) {
                    const ratio = projection / length;
                    const targetH = start.y + (end.y - start.y) * ratio;
                    const falloff = 1 - distToLine / radius;
                    const currentH = pos.getY(i);
                    pos.setY(i, currentH + (targetH - currentH) * falloff);
                    heightData[i] = pos.getY(i);
                }
            }
        }
        pos.needsUpdate = true;
        terrain.geometry.computeVertexNormals();
        drawContourMap();
        
        let newMaxHeight = 0;
        for(let i = 0; i < pos.count; i++) {
            if(pos.getY(i) > newMaxHeight) newMaxHeight = pos.getY(i);
        }
        updateShaderMaxHeight(newMaxHeight);
        updateTerrainEdges();
    }

    function resetTerrain() {
        const pos = terrain.geometry.attributes.position;
        for(let i = 0; i < pos.count; i++) {
            pos.setY(i, 0);
            heightData[i] = 0;
        }
        pos.needsUpdate = true;
        terrain.geometry.computeVertexNormals();
        drawContourMap();
        updateShaderMaxHeight(0);
        updateTerrainEdges();
    }

    function exportData() {
        alert("地形已保存到缓存。在实际应用中，这里会导出为 .hmap 格式。");
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        if(water) water.position.y = 5 + Math.sin(Date.now() * 0.001) * 0.2;
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
